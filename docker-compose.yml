version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    restart: always
    env_file:
      - .docker.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task-manager-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    build: ./backend
    container_name: task-manager-api
    restart: always
    env_file:
      - .docker.env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: task-manager-ui
    restart: always
    ports:
      - "5100:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: