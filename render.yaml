services:
  - type: web
    name: task-manager-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true

  - type: static
    name: task-manager-ui
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: task-manager-api
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://task-manager-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  - name: task-manager-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
