services:
  # Backend Web Service
  - type: web
    name: task-manager-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Web Service (Changed from 'static' to 'web')
  - type: web
    name: task-manager-ui
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: task-manager-api
          property: host
    autoDeploy: true

databases:
  - name: task-manager-db
    plan: free
    region: oregon
    postgresMajorVersion: 16